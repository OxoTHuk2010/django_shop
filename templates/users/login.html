{% extends "base.html" %}
{% block title %}Sign in | Hop & Barley{% endblock %}
{% block content %}
<main class="container" style="padding: 30px 0; max-width: 600px;">
  <h1>Sign in</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="button button--primary">Sign in</button>
  </form>
  <a href="{% url 'forgot-password' %}">Forgot password</a>
</main>
{% endblock %}
