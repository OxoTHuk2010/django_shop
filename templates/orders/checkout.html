{% extends "base.html" %}
{% block title %}Checkout | Hop & Barley{% endblock %}
{% block content %}
<main class="container" style="padding: 30px 0;">
  <h1>Checkout</h1>
  <p>Order total: <strong>${{ total }}</strong></p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button button--primary" type="submit">Place order</button>
  </form>
</main>
{% endblock %}
