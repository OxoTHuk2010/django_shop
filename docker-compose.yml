version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: myshop
      POSTGRES_USER: myshop
      POSTGRES_PASSWORD: myshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.base
      SECRET_KEY: changeme
      DEBUG: "1"
      DB_NAME: myshop
      DB_USER: myshop
      DB_PASSWORD: myshop
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      - db

volumes:
  postgres_data:
