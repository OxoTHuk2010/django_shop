services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: myshop
      POSTGRES_USER: myshop
      POSTGRES_PASSWORD: myshop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myshop -d myshop"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    expose:
      - "8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.base
      SECRET_KEY: "${SECRET_KEY:-dev-secret-key-please-change-1234567890}"
      DEBUG: "${DEBUG:-0}"
      DB_NAME: myshop
      DB_USER: myshop
      DB_PASSWORD: myshop
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python manage.py check --deploy --fail-level WARNING || python manage.py check --fail-level WARNING"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - staticfiles_data:/app/staticfiles
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    profiles:
      - prod
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles_data:/staticfiles:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  staticfiles_data:
